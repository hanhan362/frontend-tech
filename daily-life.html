<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日常 · 记账与提醒</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

  :root {
    --cream: #faf5ed;
    --paper: #f5ede0;
    --brown: #3d2c1e;
    --brown-light: #8b7355;
    --sage: #7d9b76;
    --sage-light: #e8f0e5;
    --coral: #c97b6b;
    --coral-light: #fce8e3;
    --gold: #c4a35a;
    --gold-light: #fdf3dc;
    --sky: #6b8db5;
    --sky-light: #e8eff7;
    --ink: #2c2416;
    --ink-light: #8a8178;
    --divider: #e8ddd0;
    --shadow: 0 1px 3px rgba(61, 44, 30, 0.06), 0 4px 12px rgba(61, 44, 30, 0.04);
    --shadow-lg: 0 2px 8px rgba(61, 44, 30, 0.08), 0 8px 24px rgba(61, 44, 30, 0.06);
    --radius: 12px;
    --radius-sm: 8px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: linear-gradient(135deg, #f7f0e6 0%, #faf5ed 50%, #f5ede0 100%);
    min-height: 100vh;
    color: var(--ink);
    display: flex;
    justify-content: center;
    padding: 24px 16px;
    -webkit-font-smoothing: antialiased;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(ellipse at 20% 10%, rgba(201, 123, 107, 0.04) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 90%, rgba(125, 155, 118, 0.04) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .app-wrapper {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 960px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* ---- Header ---- */
  .app-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 4px;
  }

  .app-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 28px;
    font-weight: 600;
    color: var(--brown);
    letter-spacing: 0.5px;
  }

  .app-title span {
    color: var(--sage);
  }

  .date-display {
    font-family: 'Noto Serif SC', serif;
    font-size: 14px;
    color: var(--ink-light);
    letter-spacing: 1px;
  }

  /* ---- Tab Navigation ---- */
  .tab-nav {
    display: flex;
    gap: 0;
    background: #fff;
    border-radius: var(--radius);
    padding: 4px;
    box-shadow: var(--shadow);
  }

  .tab-btn {
    flex: 1;
    padding: 12px 24px;
    border: none;
    background: transparent;
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 15px;
    font-weight: 500;
    color: var(--ink-light);
    cursor: pointer;
    border-radius: calc(var(--radius) - 4px);
    transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
    letter-spacing: 0.5px;
  }

  .tab-btn.active {
    background: linear-gradient(135deg, #faf5ed, #f5ede0);
    color: var(--brown);
    font-weight: 600;
    box-shadow: 0 1px 4px rgba(61, 44, 30, 0.06);
  }

  .tab-btn:hover:not(.active) {
    color: var(--brown);
    background: rgba(245, 237, 224, 0.4);
  }

  .tab-icon { margin-right: 6px; font-size: 16px; }

  /* ---- Main Content ---- */
  .main-content {
    display: flex;
    gap: 20px;
    min-height: 520px;
  }

  .tab-panel {
    display: none;
    flex: 1;
    flex-direction: column;
    gap: 16px;
  }

  .tab-panel.active { display: flex; }

  /* ---- Cards ---- */
  .card {
    background: #fff;
    border-radius: var(--radius);
    padding: 20px;
    box-shadow: var(--shadow);
    border: 1px solid var(--divider);
  }

  .card-header {
    font-family: 'Noto Serif SC', serif;
    font-size: 16px;
    font-weight: 600;
    color: var(--brown);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-header .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    display: inline-block;
  }

  .dot.expense { background: var(--coral); }
  .dot.income { background: var(--sage); }
  .dot.balance { background: var(--sky); }

  /* ---- Summary Cards Row ---- */
  .summary-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
  }

  .summary-card {
    background: #fff;
    border-radius: var(--radius);
    padding: 18px 20px;
    box-shadow: var(--shadow);
    border: 1px solid var(--divider);
    position: relative;
    overflow: hidden;
  }

  .summary-card::after {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 3px;
    height: 100%;
    border-radius: 3px 0 0 3px;
  }

  .summary-card.expense::after { background: var(--coral); }
  .summary-card.income::after { background: var(--sage); }
  .summary-card.balance::after { background: var(--sky); }

  .summary-label {
    font-size: 12px;
    color: var(--ink-light);
    letter-spacing: 1px;
    margin-bottom: 6px;
  }

  .summary-amount {
    font-family: 'Noto Serif SC', serif;
    font-size: 26px;
    font-weight: 600;
    color: var(--ink);
  }

  .summary-amount.expense { color: var(--coral); }
  .summary-amount.income { color: var(--sage); }
  .summary-amount.balance { color: var(--sky); }

  /* ---- Add Form ---- */
  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr auto auto;
    gap: 10px;
    align-items: end;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .form-group label {
    font-size: 12px;
    color: var(--ink-light);
    letter-spacing: 0.5px;
  }

  input, select, textarea {
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 14px;
    padding: 10px 12px;
    border: 1px solid var(--divider);
    border-radius: var(--radius-sm);
    background: #fdfaf5;
    color: var(--ink);
    outline: none;
    transition: all 0.2s;
  }

  input:focus, select:focus, textarea:focus {
    border-color: var(--sage);
    box-shadow: 0 0 0 3px rgba(125, 155, 118, 0.08);
    background: #fff;
  }

  .btn {
    padding: 10px 20px;
    border: none;
    border-radius: var(--radius-sm);
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
    white-space: nowrap;
  }

  .btn-primary {
    background: var(--sage);
    color: #fff;
  }

  .btn-primary:hover { background: #6d8a66; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(125, 155, 118, 0.25); }
  .btn-danger {
    background: transparent;
    color: var(--coral);
    padding: 4px 8px;
    font-size: 12px;
  }
  .btn-danger:hover { background: var(--coral-light); border-radius: 4px; }
  .btn-sm {
    padding: 6px 14px;
    font-size: 12px;
  }

  /* ---- Transaction List ---- */
  .txn-list {
    max-height: 340px;
    overflow-y: auto;
  }

  .txn-list::-webkit-scrollbar { width: 4px; }
  .txn-list::-webkit-scrollbar-thumb { background: var(--divider); border-radius: 2px; }

  .txn-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 0;
    border-bottom: 1px solid var(--divider);
    transition: background 0.15s;
  }

  .txn-item:last-child { border-bottom: none; }
  .txn-item:hover { background: rgba(245, 237, 224, 0.3); margin: 0 -12px; padding: 12px 12px; border-radius: 6px; }

  .txn-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .txn-icon {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .txn-icon.expense { background: var(--coral-light); }
  .txn-icon.income { background: var(--sage-light); }

  .txn-info { display: flex; flex-direction: column; gap: 2px; }
  .txn-category { font-size: 14px; font-weight: 500; color: var(--ink); }
  .txn-meta { font-size: 12px; color: var(--ink-light); }
  .txn-note { font-size: 12px; color: var(--ink-light); font-style: italic; }

  .txn-right {
    text-align: right;
    display: flex;
    flex-direction: column;
    gap: 2px;
    align-items: flex-end;
  }

  .txn-amount {
    font-family: 'Noto Serif SC', serif;
    font-size: 16px;
    font-weight: 600;
  }
  .txn-amount.expense { color: var(--coral); }
  .txn-amount.income { color: var(--sage); }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--ink-light);
    font-size: 14px;
  }

  .empty-state .empty-icon {
    font-size: 40px;
    margin-bottom: 12px;
    opacity: 0.5;
  }

  /* ---- Calendar ---- */
  .calendar-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .calendar-month {
    font-family: 'Noto Serif SC', serif;
    font-size: 18px;
    font-weight: 600;
    color: var(--brown);
  }

  .calendar-nav {
    display: flex;
    gap: 6px;
  }

  .calendar-nav button {
    width: 32px;
    height: 32px;
    border: 1px solid var(--divider);
    border-radius: 50%;
    background: #fff;
    cursor: pointer;
    font-size: 14px;
    color: var(--ink);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }

  .calendar-nav button:hover {
    background: var(--sage-light);
    border-color: var(--sage);
    color: var(--sage);
  }

  .calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }

  .calendar-day-label {
    text-align: center;
    font-size: 11px;
    color: var(--ink-light);
    padding: 6px 0;
    letter-spacing: 0.5px;
  }

  .calendar-day {
    aspect-ratio: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
    color: var(--ink);
  }

  .calendar-day:hover {
    background: var(--sage-light);
  }

  .calendar-day.today {
    background: var(--brown);
    color: #fff;
    font-weight: 600;
  }

  .calendar-day.other-month {
    color: #d5cdc0;
  }

  .calendar-day.has-event::after {
    content: '';
    position: absolute;
    bottom: 4px;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--coral);
  }

  .calendar-day.today.has-event::after {
    background: #fff;
  }

  .calendar-day.selected {
    box-shadow: 0 0 0 2px var(--sage);
  }

  /* ---- Events List ---- */
  .event-list {
    max-height: 200px;
    overflow-y: auto;
  }

  .event-list::-webkit-scrollbar { width: 4px; }
  .event-list::-webkit-scrollbar-thumb { background: var(--divider); border-radius: 2px; }

  .event-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--divider);
  }

  .event-item:last-child { border-bottom: none; }

  .event-time {
    font-family: 'Noto Serif SC', serif;
    font-size: 13px;
    color: var(--sky);
    font-weight: 600;
    min-width: 48px;
    padding-top: 2px;
  }

  .event-info { flex: 1; }
  .event-title { font-size: 14px; font-weight: 500; color: var(--ink); }
  .event-desc { font-size: 12px; color: var(--ink-light); margin-top: 2px; }

  .event-date-badge {
    font-size: 11px;
    color: var(--sky);
    background: var(--sky-light);
    padding: 2px 8px;
    border-radius: 10px;
    white-space: nowrap;
  }

  /* ---- Modal ---- */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(44, 36, 22, 0.4);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: fadeIn 0.2s;
  }

  .modal-overlay.hidden { display: none; }

  .modal {
    background: #fff;
    border-radius: var(--radius);
    padding: 24px;
    width: 90%;
    max-width: 420px;
    box-shadow: var(--shadow-lg);
    animation: slideUp 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .modal h3 {
    font-family: 'Noto Serif SC', serif;
    font-size: 18px;
    color: var(--brown);
    margin-bottom: 16px;
  }

  .modal .form-group { margin-bottom: 12px; }

  .modal-actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    margin-top: 20px;
  }

  .btn-outline {
    background: transparent;
    border: 1px solid var(--divider);
    color: var(--ink-light);
  }

  .btn-outline:hover { background: #faf5ed; border-color: var(--brown-light); }

  /* ---- Category Chart ---- */
  .chart-area {
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 8px 0;
  }

  canvas { display: block; }

  .chart-legend {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--ink);
  }

  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 3px;
    flex-shrink: 0;
  }

  .legend-amount {
    font-weight: 500;
    margin-left: 4px;
  }

  /* ---- Animations ---- */
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

  .txn-item { animation: slideUp 0.3s ease both; }
  .txn-item:nth-child(1) { animation-delay: 0s; }
  .txn-item:nth-child(2) { animation-delay: 0.03s; }
  .txn-item:nth-child(3) { animation-delay: 0.06s; }
  .txn-item:nth-child(4) { animation-delay: 0.09s; }
  .txn-item:nth-child(5) { animation-delay: 0.12s; }
  .txn-item:nth-child(6) { animation-delay: 0.15s; }
  .txn-item:nth-child(7) { animation-delay: 0.18s; }
  .txn-item:nth-child(8) { animation-delay: 0.21s; }
  .txn-item:nth-child(9) { animation-delay: 0.24s; }
  .txn-item:nth-child(10) { animation-delay: 0.27s; }

  /* ---- Responsive ---- */
  @media (max-width: 768px) {
    .form-row {
      grid-template-columns: 1fr 1fr;
    }
    .form-row .btn-primary {
      grid-column: 1 / -1;
    }
    .summary-row {
      grid-template-columns: 1fr;
    }
    .chart-area {
      flex-direction: column;
      align-items: center;
    }
    .calendar-grid { gap: 2px; }
    .calendar-day { font-size: 12px; }
  }
</style>
</head>
<body>

<div class="app-wrapper">
  <!-- Header -->
  <div class="app-header">
    <div class="app-title">日常<span>·记</span></div>
    <div class="date-display" id="headerDate"></div>
  </div>

  <!-- Tab Navigation -->
  <div class="tab-nav">
    <button class="tab-btn active" data-tab="bookkeeping">
      <span class="tab-icon">📒</span> 记账
    </button>
    <button class="tab-btn" data-tab="calendar">
      <span class="tab-icon">📅</span> 日历提醒
    </button>
  </div>

  <!-- ========== TAB: 记账 ========== -->
  <div class="tab-panel active" id="panel-bookkeeping">
    <!-- Summary Cards -->
    <div class="summary-row">
      <div class="summary-card expense">
        <div class="summary-label">本月支出</div>
        <div class="summary-amount expense" id="totalExpense">¥0</div>
      </div>
      <div class="summary-card income">
        <div class="summary-label">本月收入</div>
        <div class="summary-amount income" id="totalIncome">¥0</div>
      </div>
      <div class="summary-card balance">
        <div class="summary-label">本月结余</div>
        <div class="summary-amount balance" id="totalBalance">¥0</div>
      </div>
    </div>

    <!-- Add Form -->
    <div class="card">
      <div class="card-header"><span class="dot expense"></span> 记一笔</div>
      <div class="form-row">
        <div class="form-group">
          <label>类型</label>
          <select id="txnType">
            <option value="expense">支出</option>
            <option value="income">收入</option>
          </select>
        </div>
        <div class="form-group">
          <label>金额</label>
          <input type="number" id="txnAmount" placeholder="0.00" step="0.01" min="0.01">
        </div>
        <div class="form-group">
          <label>分类</label>
          <select id="txnCategory">
            <option value="🍔 餐饮">🍔 餐饮</option>
            <option value="🚇 交通">🚇 交通</option>
            <option value="🛒 购物">🛒 购物</option>
            <option value="🏠 居住">🏠 居住</option>
            <option value="🎬 娱乐">🎬 娱乐</option>
            <option value="💊 医疗">💊 医疗</option>
            <option value="📚 教育">📚 教育</option>
            <option value="💼 薪资">💼 薪资</option>
            <option value="🎁 礼金">🎁 礼金</option>
            <option value="📦 其他">📦 其他</option>
          </select>
        </div>
        <button class="btn btn-primary" onclick="addTransaction()">✓ 记录</button>
      </div>
      <div class="form-row" style="margin-top:10px; grid-template-columns: 1fr 1fr;">
        <div class="form-group">
          <label>日期</label>
          <input type="date" id="txnDate">
        </div>
        <div class="form-group">
          <label>备注（可选）</label>
          <input type="text" id="txnNote" placeholder="例如：午餐外卖">
        </div>
      </div>
    </div>

    <!-- Category Chart + Transactions -->
    <div style="display:grid; grid-template-columns: 1fr 1.2fr; gap:16px;">
      <div class="card">
        <div class="card-header"><span class="dot expense"></span> 支出分类</div>
        <div class="chart-area" id="chartArea">
          <canvas id="pieChart" width="170" height="170"></canvas>
          <div class="chart-legend" id="chartLegend"></div>
        </div>
        <div class="empty-state" id="chartEmpty">
          <div class="empty-icon">📊</div>
          <div>暂无支出数据</div>
        </div>
      </div>
      <div class="card">
        <div class="card-header"><span class="dot expense"></span> 本月明细</div>
        <div class="txn-list" id="txnList">
          <div class="empty-state">
            <div class="empty-icon">📝</div>
            <div>还没有记录，开始记一笔吧</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ========== TAB: 日历提醒 ========== -->
  <div class="tab-panel" id="panel-calendar">
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:16px;">
      <!-- Calendar -->
      <div class="card">
        <div class="calendar-header">
          <span class="calendar-month" id="calMonth"></span>
          <div class="calendar-nav">
            <button onclick="changeMonth(-1)">◀</button>
            <button onclick="changeMonth(1)">▶</button>
          </div>
        </div>
        <div class="calendar-grid" id="calGrid"></div>
      </div>

      <!-- Events of selected date -->
      <div class="card">
        <div class="card-header">
          <span class="dot balance"></span>
          <span id="eventDateTitle">今日提醒</span>
        </div>
        <div class="event-list" id="eventList">
          <div class="empty-state">
            <div class="empty-icon">🔔</div>
            <div id="eventEmptyText">今天没有安排</div>
          </div>
        </div>
        <div style="margin-top: 12px; display: flex; gap: 8px;">
          <button class="btn btn-primary btn-sm" onclick="openEventModal()">+ 添加提醒</button>
          <button class="btn btn-outline btn-sm" onclick="selectToday()">回到今天</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Event Modal -->
<div class="modal-overlay hidden" id="eventModal">
  <div class="modal">
    <h3 id="modalTitle">添加提醒</h3>
    <div class="form-group">
      <label>日期</label>
      <input type="date" id="eventDate">
    </div>
    <div class="form-group">
      <label>时间（可选）</label>
      <input type="time" id="eventTime">
    </div>
    <div class="form-group">
      <label>标题</label>
      <input type="text" id="eventTitle" placeholder="例如：交房租">
    </div>
    <div class="form-group">
      <label>备注（可选）</label>
      <textarea id="eventDesc" rows="2" placeholder="补充说明..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeEventModal()">取消</button>
      <button class="btn btn-primary" id="eventSaveBtn" onclick="saveEvent()">保存</button>
    </div>
  </div>
</div>

<script>
// ========== DATA STORE ==========
const STORAGE_KEY_TXN = 'daily_life_transactions';
const STORAGE_KEY_EVENT = 'daily_life_events';

function loadData(key) {
  try { return JSON.parse(localStorage.getItem(key)) || []; }
  catch { return []; }
}

function saveData(key, data) {
  localStorage.setItem(key, JSON.stringify(data));
}

let transactions = loadData(STORAGE_KEY_TXN);
let events = loadData(STORAGE_KEY_EVENT);

// ========== UTILS ==========
function formatMoney(n) {
  return '¥' + Number(n).toFixed(2);
}

function getToday() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}

function getCurrentMonth() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
}

// ========== HEADER DATE ==========
function updateHeaderDate() {
  const d = new Date();
  const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
  const str = d.getFullYear() + '年' + (d.getMonth() + 1) + '月' + d.getDate() + '日 星期' + weekdays[d.getDay()];
  document.getElementById('headerDate').textContent = str;
}

// ========== TAB SWITCHING ==========
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('panel-' + btn.dataset.tab).classList.add('active');
    if (btn.dataset.tab === 'calendar') renderCalendar();
    if (btn.dataset.tab === 'bookkeeping') renderBookkeeping();
  });
});

// ========== BOOKKEEPING ==========
const CATEGORY_EXPENSE = ['🍔 餐饮', '🚇 交通', '🛒 购物', '🏠 居住', '🎬 娱乐', '💊 医疗', '📚 教育', '📦 其他'];
const CATEGORY_INCOME = ['💼 薪资', '🎁 礼金', '📦 其他'];
const CATEGORY_COLORS = {
  '🍔 餐饮': '#c97b6b', '🚇 交通': '#d4a373', '🛒 购物': '#e0a899', '🏠 居住': '#b5838d',
  '🎬 娱乐': '#8b7355', '💊 医疗': '#a98467', '📚 教育': '#6c584c', '💼 薪资': '#7d9b76',
  '🎁 礼金': '#a3b18a', '📦 其他': '#adc4b5'
};

function updateCategorySelect() {
  const type = document.getElementById('txnType').value;
  const sel = document.getElementById('txnCategory');
  const cats = type === 'income' ? CATEGORY_INCOME : CATEGORY_EXPENSE;
  sel.innerHTML = cats.map(c => `<option value="${c}">${c}</option>`).join('');
}

document.getElementById('txnType').addEventListener('change', updateCategorySelect);
document.getElementById('txnDate').value = getToday();

function addTransaction() {
  const type = document.getElementById('txnType').value;
  const amount = parseFloat(document.getElementById('txnAmount').value);
  const category = document.getElementById('txnCategory').value;
  const date = document.getElementById('txnDate').value || getToday();
  const note = document.getElementById('txnNote').value.trim();

  if (!amount || amount <= 0) {
    alert('请输入有效金额');
    return;
  }

  transactions.unshift({
    id: Date.now(),
    type,
    amount,
    category,
    date,
    note,
    month: date.substring(0, 7),
  });

  saveData(STORAGE_KEY_TXN, transactions);
  document.getElementById('txnAmount').value = '';
  document.getElementById('txnNote').value = '';
  renderBookkeeping();
}

function deleteTransaction(id) {
  transactions = transactions.filter(t => t.id !== id);
  saveData(STORAGE_KEY_TXN, transactions);
  renderBookkeeping();
}

function renderBookkeeping() {
  const month = getCurrentMonth();
  const monthTxns = transactions.filter(t => t.month === month);

  // Summary
  const totalExp = monthTxns.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
  const totalInc = monthTxns.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
  document.getElementById('totalExpense').textContent = formatMoney(totalExp);
  document.getElementById('totalIncome').textContent = formatMoney(totalInc);
  document.getElementById('totalBalance').textContent = formatMoney(totalInc - totalExp);

  // Transaction List
  const list = document.getElementById('txnList');
  if (monthTxns.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="empty-icon">📝</div><div>还没有记录，开始记一笔吧</div></div>';
  } else {
    list.innerHTML = monthTxns.map(t => `
      <div class="txn-item">
        <div class="txn-left">
          <div class="txn-icon ${t.type}">${t.type === 'expense' ? '💸' : '💰'}</div>
          <div class="txn-info">
            <div class="txn-category">${t.category}</div>
            <div class="txn-meta">${t.date}${t.note ? ' · ' + t.note : ''}</div>
          </div>
        </div>
        <div class="txn-right">
          <div class="txn-amount ${t.type}">${t.type === 'expense' ? '-' : '+'}${formatMoney(t.amount)}</div>
          <button class="btn btn-danger" onclick="deleteTransaction(${t.id})">删除</button>
        </div>
      </div>
    `).join('');
  }

  // Pie Chart
  renderPieChart(monthTxns.filter(t => t.type === 'expense'));
}

function renderPieChart(expenseTxns) {
  const canvas = document.getElementById('pieChart');
  const ctx = canvas.getContext('2d');
  const legend = document.getElementById('chartLegend');
  const empty = document.getElementById('chartEmpty');

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Aggregate by category
  const agg = {};
  expenseTxns.forEach(t => {
    agg[t.category] = (agg[t.category] || 0) + t.amount;
  });

  const entries = Object.entries(agg).sort((a, b) => b[1] - a[1]);
  const total = entries.reduce((s, [, v]) => s + v, 0);

  if (entries.length === 0) {
    canvas.style.display = 'none';
    legend.innerHTML = '';
    empty.style.display = 'block';
    return;
  }

  canvas.style.display = 'block';
  empty.style.display = 'none';

  const cx = 85, cy = 85, r = 70;
  let angle = -Math.PI / 2;

  entries.forEach(([cat, val]) => {
    const slice = (val / total) * Math.PI * 2;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, angle, angle + slice);
    ctx.closePath();
    ctx.fillStyle = CATEGORY_COLORS[cat] || '#ccc';
    ctx.fill();
    angle += slice;
  });

  // Inner circle (donut)
  ctx.beginPath();
  ctx.arc(cx, cy, 38, 0, Math.PI * 2);
  ctx.fillStyle = '#fff';
  ctx.fill();

  legend.innerHTML = entries.map(([cat, val]) => `
    <div class="legend-item">
      <div class="legend-dot" style="background:${CATEGORY_COLORS[cat] || '#ccc'}"></div>
      <span>${cat.replace(/^[^\s]+\s/, '')}</span>
      <span class="legend-amount">${formatMoney(val)}</span>
    </div>
  `).join('');
}

// ========== CALENDAR ==========
let calYear, calMonth, selectedDate = getToday();

function initCalendar() {
  const today = new Date();
  calYear = today.getFullYear();
  calMonth = today.getMonth() + 1;
  selectedDate = getToday();
}

function changeMonth(delta) {
  calMonth += delta;
  if (calMonth > 12) { calMonth = 1; calYear++; }
  if (calMonth < 1) { calMonth = 12; calYear--; }
  renderCalendar();
}

function selectToday() {
  const today = new Date();
  calYear = today.getFullYear();
  calMonth = today.getMonth() + 1;
  selectedDate = getToday();
  renderCalendar();
}

function getEventDates() {
  const set = new Set();
  events.forEach(e => set.add(e.date));
  return set;
}

function renderCalendar() {
  const eventDates = getEventDates();
  const today = getToday();

  document.getElementById('calMonth').textContent = calYear + '年 ' + calMonth + '月';

  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';

  // Day labels
  ['日', '一', '二', '三', '四', '五', '六'].forEach(d => {
    const lbl = document.createElement('div');
    lbl.className = 'calendar-day-label';
    lbl.textContent = d;
    grid.appendChild(lbl);
  });

  const firstDay = new Date(calYear, calMonth - 1, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth, 0).getDate();
  const daysInPrev = new Date(calYear, calMonth - 1, 0).getDate();

  // Previous month fill
  for (let i = firstDay - 1; i >= 0; i--) {
    const day = daysInPrev - i;
    const dateStr = `${calYear}-${String(calMonth - 1 || 12).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
    const div = createDayEl(day, 'other-month', dateStr, eventDates.has(dateStr));
    grid.appendChild(div);
  }

  // Current month
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${calYear}-${String(calMonth).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
    let cls = '';
    if (dateStr === today) cls += ' today';
    if (dateStr === selectedDate) cls += ' selected';
    const div = createDayEl(d, cls, dateStr, eventDates.has(dateStr));
    grid.appendChild(div);
  }

  // Next month fill
  const remaining = 42 - grid.children.length;
  for (let d = 1; d <= remaining; d++) {
    const dateStr = `${calYear}-${String(calMonth + 1 > 12 ? 1 : calMonth + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
    const div = createDayEl(d, 'other-month', dateStr, eventDates.has(dateStr));
    grid.appendChild(div);
  }

  renderEvents(selectedDate);
}

function createDayEl(day, cls, dateStr, hasEvent) {
  const div = document.createElement('div');
  div.className = 'calendar-day' + (cls ? ' ' + cls : '') + (hasEvent ? ' has-event' : '');
  div.textContent = day;
  div.addEventListener('click', () => {
    selectedDate = dateStr;
    if (dateStr.startsWith((calYear + '-' + String(calMonth).padStart(2, '0')))) {
      renderCalendar();
    } else {
      // Jump to that month
      const [y, m] = dateStr.split('-').map(Number);
      calYear = y;
      calMonth = m;
      renderCalendar();
    }
  });
  return div;
}

function renderEvents(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
  const title = d.getMonth() + 1 + '月' + d.getDate() + '日 星期' + weekdays[d.getDay()];
  document.getElementById('eventDateTitle').textContent = title;

  const dayEvents = events.filter(e => e.date === dateStr).sort((a, b) => (a.time || '').localeCompare(b.time || ''));

  const list = document.getElementById('eventList');
  const emptyText = document.getElementById('eventEmptyText');

  if (dayEvents.length === 0) {
    list.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🔔</div>
        <div>${dateStr === getToday() ? '今天没有安排' : '当天没有安排'}</div>
      </div>`;
  } else {
    list.innerHTML = dayEvents.map(e => `
      <div class="event-item">
        <div class="event-time">${e.time || '全天'}</div>
        <div class="event-info">
          <div class="event-title">${e.title}</div>
          ${e.desc ? '<div class="event-desc">' + e.desc + '</div>' : ''}
        </div>
        <button class="btn btn-danger" onclick="deleteEvent(${e.id})">删除</button>
      </div>
    `).join('');
  }

  document.getElementById('eventDate').value = dateStr;
}

function openEventModal() {
  document.getElementById('eventDate').value = selectedDate;
  document.getElementById('eventTime').value = '';
  document.getElementById('eventTitle').value = '';
  document.getElementById('eventDesc').value = '';
  document.getElementById('modalTitle').textContent = '添加提醒';
  document.getElementById('eventModal').classList.remove('hidden');
}

function closeEventModal() {
  document.getElementById('eventModal').classList.add('hidden');
}

function saveEvent() {
  const date = document.getElementById('eventDate').value;
  const time = document.getElementById('eventTime').value;
  const title = document.getElementById('eventTitle').value.trim();
  const desc = document.getElementById('eventDesc').value.trim();

  if (!title) { alert('请输入标题'); return; }
  if (!date) { alert('请选择日期'); return; }

  events.unshift({ id: Date.now(), date, time, title, desc });
  saveData(STORAGE_KEY_EVENT, events);
  closeEventModal();
  selectedDate = date;
  // Sync calendar month
  const [y, m] = date.split('-').map(Number);
  calYear = y;
  calMonth = m;
  renderCalendar();
}

function deleteEvent(id) {
  events = events.filter(e => e.id !== id);
  saveData(STORAGE_KEY_EVENT, events);
  renderCalendar();
}

// Close modal on overlay click
document.getElementById('eventModal').addEventListener('click', function(e) {
  if (e.target === this) closeEventModal();
});

// ========== INIT ==========
updateHeaderDate();
initCalendar();
renderBookkeeping();
renderCalendar();
updateCategorySelect();

// Update header date every minute
setInterval(updateHeaderDate, 60000);
</script>
</body>
</html>
